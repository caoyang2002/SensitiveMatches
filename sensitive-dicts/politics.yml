  # ==================================================
  # 政治隐喻/侮辱变体
  # ==================================================

  - id: POL005

    priority: 700

    label: 政治攻击词

    tags:
      - 侮辱

      - 政治

    action: review

    score: 60

    regex: >
      (
      共匪|
      共残党|
      共残主义|
      共惨|
      共狗|
      共贪党|
      狗产蛋|
