      徇私舞弊|
      玩忽职守|
      严重违纪|
      双规|
      双开|
      开除党籍|
      留党察看|
      撤销职务|
      判处死刑|
      无期徒刑|
      有期徒刑
      )

  # ==================================================
  # 政治职务
  # ==================================================

  - id: POL008

    priority: 500

    label: 政治职位

    action: review

    score: 40

    regex: >
      (
      中央领导|
      主席画像|
      书记|
      领导人|
      高官名单
      )
