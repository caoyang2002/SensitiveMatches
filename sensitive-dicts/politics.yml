  # ==================================================
  # 政治事件
  # ==================================================

  - id: POL006

    priority: 700

    label: 政治事件

    action: review

    score: 60

    regex: >
      (
      新疆骚乱|
      改革历程|
      法轮功
      )

  # ==================================================
  # 腐败案件
  # ==================================================

  - id: POL007

    priority: 600

    label: 腐败案件

    tags:
      - 贪腐

      - 司法

    action: review

    score: 50

    regex: >
