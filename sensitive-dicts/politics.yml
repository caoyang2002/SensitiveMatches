version: 1

name: politics

description: 政治敏感内容规则

enabled: true

rules:
  # ==================================================
  # 政治组织
  # ==================================================

  - id: POL001

    priority: 1000

    category: politics

    label: 政治组织

    tags:
      - 政治
      - 组织名称

    action: review

    score: 90

    regex: >
      (?i)(
      gc党|
      gong党|
      gongchandang|
      communistparty|
      gcd|
      g产|
      g匪|
      中gong|
      中共|
      中国共产党|
      共产党|
      共产主义|
      土共|
      工产党|
      公产党|
      供产|
      供铲党|
      供铲裆|
      供铲谠|
      共c党|
      共x党|
      阿共|
      邪党|
      恶党
      )

  # ==================================================
  # 政府机构变体
  # ==================================================

  - id: POL002

    priority: 900

    category: politics

    label: 政府机构

    tags:
      - 政府
      - 机构

    action: review

    score: 70

    regex: >
      (
      zhengfu|
      政f|
      政zhi|
      政付|
      政俯|
      政腐|
      正府|
      国wu院|
      中央zf|
      中国zf|
      北京当局|
      大陆官方|
      大陆当局
      )

  # ==================================================
  # 国家领导相关
  # ==================================================

  - id: POL003

    priority: 1000

    label: 国家领导人

    tags:
      - 人物

      - 政治

    action: review

    score: 100

    regex: >
      (
      习近平|
      xjp|
      xi.?jin.?ping|
      习仲勋|
      习太子|
      习明泽|
      hjt|
      hujintao|
      胡锦涛|
      胡主席|
      胡总|
      胡jt|
      江泽民|
      江zm|
      jzm|
      jiang.?zemin|
      毛泽东|
      mao.?zedong|
      毛zd|
      毛zx|
      邓小平|
      deng.?xiaoping|
      邓xp|
      李鹏|
      李peng|
      李克强
      )

  # ==================================================
  # 领导人姓名变体
  # ==================================================

  - id: POL004

    priority: 800

    label: 政治人物

    action: review

    score: 80

    regex: >
      (
      刘少奇|
      刘云山|
      刘奇葆|
      刘延东|
      周小川|
      周永康|
      吴邦国|
      吴官正|
      王岐山|
      王沪宁|
      张德江|
      张高丽|
      俞正声|
      令计划|
      曾庆红|
      曾培炎|
      贾庆林|
      赵洪祝|
      贺国强|
      郭伯雄|
      郭金龙|
      薄熙来|
      陈良宇|
      陈希同
