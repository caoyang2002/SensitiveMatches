version: 1

name: advertisement

description: 广告法及营销风险规则

enabled: true

rules:
  # ==================================================
  # 极限词
  # ==================================================

  - id: AD_LIMIT_001

    label: 极限宣传

    category: advertisement

    tags:
      - 广告法
      - 极限词

    action: review

    score: 80

    regex: >

      (
        最[\p{Han}A-Za-z0-9]{0,8}
        |
        (顶|高|低|极|超)(级|端|致|佳|尖)
        |
        (第一|冠军|领先|巅峰)
        |
        (唯一|独一无二)
      )

  # ==================================================
  # 第一 / 排名 / 第一品牌
  # ==================================================

  - id: AD_LIMIT_002

    label: 排名第一

    action: review

    score: 90

    regex: >

      (

        全国销量冠军

        |

        (全国|全球|中国|全网)?第\s*一

        |

        第一品牌

        |

        排名第一

        |

        销量第一

      )

  # ==================================================
  # 世界级 / 国家级 / 权威
  # ==================================================

  - id: AD_AUTH_001

    label: 权威背书

    action: review

    score: 70

    regex: >

      (

        世界级

        |

        世界领先

        |

        全球级

        |

        国际级

        |

        国家级

        |

        国家免检

        |

        中国驰名(商标)?

        |

        央视品牌

        |

        CCTV品牌

      )

  # ==================================================
  # 首发首家
  # ==================================================

  - id: AD_NEW_001

    label: 首创宣传

    action: review

    score: 60

    regex: >

      (

        首(个|家|发|次|款)

        |

        全国首发

        |

        全国首家

      )

  # ==================================================
  # 绝对保证
  # ==================================================

  - id: AD_EFFECT_001

    label: 绝对化承诺

    action: review

    score: 80

    regex: >

      (

        100%

        |

        永久

        |

        永不.{0,5}(反弹|复发)

        |

        绝不.{0,5}(反弹|失败)

        |

        绝无.{0,5}(副作用|风险)

        |

        无任何副作用

        |

        零副作用

      )

  # ==================================================
  # 医疗功效
  # ==================================================

  - id: AD_MEDICAL_001

    label: 医疗效果

    action: block

    score: 100

    regex: >

      (

        一天.{0,5}(见效|治愈)

        |

        一秒变

        |

        次见效

        |

        天见效

        |

        根除

        |

        彻底消除

        |

        治愈率高达

        |

        神效

        |

        特效

      )

  # ==================================================
  # 疾病词
  # ==================================================

  - id: AD_MEDICAL_002

    label: 疾病治疗

    action: review

    score: 80

    regex: >

      (

        关节炎

        |

        类风湿

        |

        肝炎

        |

        肿瘤

        |

        囊肿

        |

        助孕

        |

        生精

      )

  # ==================================================
  # 促销诱导
  # ==================================================

  - id: AD_PROMO_001

    label: 虚假促销

    action: review

    score: 50

    regex: >

      (

        万人疯抢

        |

        全民(抢购|疯抢)

        |

        抢(爆|疯了)

        |

        卖疯了

        |

        秒杀(全网)?

        |

        再不抢就没了

        |

        错过就没机会了

        |

        最后一波

        |

        仅此一次

      )

  # ==================================================
  # 价格诱导
  # ==================================================

  - id: AD_PRICE_001

    label: 价格宣传

    action: review

    score: 60

    regex: >

      (

        最低价

        |

        史上最低价

        |

        底价

        |

        抄底

        |

        低价出售

      )

  # ==================================================
  # 点击诱导
  # ==================================================

  - id: AD_CLICK_001

    label: 点击诱导

    action: review

    score: 40

    regex: >

      点击.{0,8}

      (

        有惊喜

        |

        获取

        |

        领取

        |

        试穿

        |

        翻转

        |

        转身

      )

  # ==================================================
  # 独家配方
  # ==================================================

  - id: AD_PRODUCT_001

    label: 产品虚假宣传

    action: review

    score: 50

    regex: >

      (

        独家

        |

        独家配方

        |

        王牌

        |

        王者

        |

        至尊

        |

        百年品质

        |

        祖传

        |

        纯天然

      )

  # ==================================================
  # 免费
  # ==================================================

  - id: AD_FREE_001

    label: 免费营销

    action: review

    score: 40

    regex: >

      免费

      (

        使用

        |

        索取

        |

        订购

        |

        领取

        |

        二级域名

      )?

  # ==================================================
  # 联系方式
  # ==================================================

  - id: SP_CONTACT_001

    label: 联系方式

    action: review

    score: 50

    regex: >

      (

        (?i)\bqq\b

        |

        (?i)\bvx\b

        |

        微信

        |

        1[3-9]\d{9}

        |

        \d{5,12}\s*qq

      )

  # ==================================================
  # 下载资源
  # ==================================================

  - id: SP_DOWNLOAD_001

    label: 下载引流

    action: review

    score: 40

    regex: >

      (

        txt下载

        |

        下载速度

        |

        高清在线

        |

        在线播放

        |

        全集在线

      )

  # ==================================================
  # 非法交易
  # ==================================================

  - id: ILLEGAL_001

    label: 违法交易

    action: block

    score: 100

    regex: >

      (

        代开发票

        |

        代孕妈妈

        |

        代生孩子

        |

        借腹生子

        |

        信用卡提现

        |

        地下钱庄

        |

        售肾

        |

        套牌车

      )

  # ==================================================
  # 色情低俗
  # ==================================================

  - id: PORN_001

    label: 色情内容

    action: block

    score: 100

    regex: >

      (

        3P

        |

        SM

        |

        口交

        |

        口爆

        |

        吞精

        |

        足交

        |

        胸推

        |

        推油

        |

        楼凤

        |

        包夜

        |

        性伴侣

      )

  # ==================================================
  # 赌博
  # ==================================================

  - id: GAMBLE_001
    label: 赌博
    action: block
    score: 100
    regex: >
      (
        六合彩
        |
        足球投注
        |
        送qb
        |
        q币
      )

  # ==================================================
  # 引流
  # ==================================================

  - id: SPAM_001

    label: 商业引流

    action: review

    score: 50

    regex: >

      (

        淘宝

        |

        微店

        |

        网购

        |

        客服

        |

        销售热线

        |

        详情请进入

        |

        请点击进入

      )
